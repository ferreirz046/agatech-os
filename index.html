<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aga Tech - OS</title>

<style>
body{
font-family: Arial;
background:#f4f6fb;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
}

h1{
text-align:center;
}

input, textarea, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#1E40FF;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>AGA TECH - Ordem de Serviço</h1>

<input id="cliente" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone">
<input id="modelo" placeholder="Modelo do celular">
<input id="imei" placeholder="IMEI">

<textarea id="defeito" placeholder="Defeito relatado"></textarea>

<select id="status">
<option>Em análise</option>
<option>Em reparo</option>
<option>Pronto</option>
<option>Entregue</option>
</select>

<button onclick="salvar()">Salvar OS</button>

<h2>OS Criadas</h2>
<div id="lista"></div>

</div>

<script>

const API = "http://localhost:3000";

async function salvar(){

await fetch(API+"/os",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
cliente:cliente.value,
telefone:telefone.value,
modelo:modelo.value,
imei:imei.value,
defeito:defeito.value,
status:status.value
})
});

alert("OS salva!");
load();
}

async function load(){

const res = await fetch(API+"/os");
const data = await res.json();

lista.innerHTML = data.map(os => `
<div class="card">
<b>${os.os_numero}</b><br>
${os.cliente} - ${os.modelo}<br>
Status: ${os.status}
</div>
`).join("");

}

load();

</script>

</body>
</html>
