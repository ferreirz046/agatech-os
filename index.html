<!DOCTYPE html>
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Aga Tech</title>

<style>

body{
margin:0;
font-family:Arial;
background:#F5F7FB;
}

.topo{

background:#1E40FF;

padding:30px;

text-align:center;

color:white;

}

.logo{

width:140px;

margin-bottom:15px;

}

.container{

max-width:850px;

margin:30px auto;

padding:20px;

}

.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 10px 25px
rgba(0,0,0,.08);

}

input,
textarea{

width:100%;

padding:14px;

margin-top:10px;

margin-bottom:14px;

border-radius:10px;

border:1px solid #ddd;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#1E40FF;

color:white;

font-size:18px;

cursor:pointer;

}

.os{

margin-top:20px;

}

.item{

background:#f6f6f6;

padding:14px;

margin-top:10px;

border-radius:12px;

}

</style>

</head>

<body>

<div class="topo">

<img
src="logo.png"
class="logo">

<h1>AGA TECH</h1>

</div>

<div class="container">

<div class="card">

<input
id="cliente"
placeholder="Cliente">

<input
id="modelo"
placeholder="Modelo">

<textarea
id="defeito"
placeholder="Defeito">
</textarea>

<button
onclick="salvar()">

Salvar OS

</button>

<div
class="os"
id="lista">
</div>

</div>

</div>

<script>

let lista =
JSON.parse(
localStorage.getItem(
"aga_os"
)
) || [];

render();

function salvar(){

if(
!cliente.value
){

alert(
"Preencha o cliente"
);

return;

}

lista.unshift({

cliente:
cliente.value,

modelo:
modelo.value,

defeito:
defeito.value,

numero:
Date.now()

});

localStorage.setItem(
"aga_os",
JSON.stringify(lista)
);

cliente.value="";
modelo.value="";
defeito.value="";

render();

}

function excluir(id){

lista=
lista.filter(
x=>
x.numero!==id
);

localStorage.setItem(
"aga_os",
JSON.stringify(lista)
);

render();

}

function render(){

document
.getElementById(
"lista"
)
.innerHTML=

lista.map(
x=>

`

<div class=item>

<b>
OS ${x.numero}
</b>

<br><br>

Cliente:
${x.cliente}

<br>

Modelo:
${x.modelo}

<br>

Defeito:
${x.defeito}

<br><br>

<button
onclick="
excluir(
${x.numero}
)
">

Excluir

</button>

</div>

`

).join("");

}

</script>

</body>

</html>
